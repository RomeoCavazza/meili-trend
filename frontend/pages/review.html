<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Insidr — Review Demo</title>
  <style>
    body{margin:0;font-family:system-ui;background:#0b1220;color:#fff}
    .wrap{max-width:600px;margin:0 auto;padding:24px}
    .card{background:#0e1628;border:1px solid #1e293b;border-radius:12px;padding:24px;margin-bottom:16px}
    h1{font-size:24px;margin:0 0 16px}
    .btn{display:inline-block;padding:12px 16px;border-radius:8px;background:#4f46e5;color:#fff;text-decoration:none;border:none;cursor:pointer;margin-right:8px}
    .btn:hover{background:#4338ca}
    .btn-success{background:#10b981}
    .btn-danger{background:#ef4444}
    input{padding:12px;border:1px solid #374151;border-radius:8px;background:#1f2937;color:#fff;width:100%;box-sizing:border-box;margin:8px 0}
    .status{padding:12px;border-radius:8px;margin:8px 0}
    .status.success{background:#065f46;color:#d1fae5}
    .status.error{background:#7f1d1d;color:#fecaca}
    .hidden{display:none}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Insidr Review Demo</h1>
      
      <div id="auth-section">
        <button class="btn" onclick="connectInstagram()">📸 Se connecter avec Instagram</button>
        <p><a href="/privacy">Politique de confidentialité</a></p>
      </div>

      <div id="connected-section" class="hidden">
        <div class="status success">✅ Connecté avec Instagram Business</div>
        <input type="text" id="hashtag" placeholder="hashtag (ex: fashion)" value="fashion">
        <button class="btn btn-success" onclick="ingestHashtag()">🔍 Analyser</button>
        <button class="btn btn-danger" onclick="disconnectInstagram()">🚪 Déconnexion</button>
        <div id="results"></div>
      </div>
    </section>
  </main>

  <script>
    const API = "/api/backend";
    
    if (new URLSearchParams(location.search).get('connected') === '1') {
      showConnected();
    }
    
    function connectInstagram() {
      location.href = `${API}/auth/instagram/start`;
    }
    
    function showConnected() {
      document.getElementById('auth-section').classList.add('hidden');
      document.getElementById('connected-section').classList.remove('hidden');
    }
    
    function disconnectInstagram() {
      document.getElementById('auth-section').classList.remove('hidden');
      document.getElementById('connected-section').classList.add('hidden');
    }
    
    async function ingestHashtag() {
      const hashtag = document.getElementById('hashtag').value.trim();
      const results = document.getElementById('results');
      
      results.innerHTML = '<div class="status">⏳ Analyse...</div>';
      
      try {
        const r = await fetch(`${API}/v1/ingest/instagram/hashtag`, {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({tag: hashtag.replace('#',''), kind: 'top', limit: 20})
        });
        
        const data = await r.json();
        results.innerHTML = `<div class="status success">✅ ${data.inserted} posts indexés</div><a href="/search?q=${hashtag}" class="btn">Voir résultats</a>`;
      } catch (error) {
        results.innerHTML = `<div class="status error">❌ Erreur: ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
