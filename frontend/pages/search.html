<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Insidr — Search</title>
  <link rel="icon" href="/public/favicon.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,sans-serif;background:#0b1220;color:#cbd5e1;padding:2rem;max-width:1200px;margin:0 auto}
    header{background:#0e1628;border:1px solid #1e293b;padding:1.5rem;border-radius:12px;margin-bottom:1.5rem}
    h1{font-size:1.5rem;background:linear-gradient(90deg,#60a5fa,#a78bfa,#f472b6);-webkit-background-clip:text;color:transparent;margin-bottom:1rem}
    .nav a{color:#93c5fd;text-decoration:none;font-size:.9rem}
    .search-bar{display:flex;gap:.5rem;margin-top:1rem}
    input,button{padding:.75rem;border:1px solid #334155;border-radius:.5rem;font-size:1rem;background:#1e293b;color:#e2e8f0}
    input{flex:1}
    button{background:#4f46e5;color:#fff;border:none;cursor:pointer;font-weight:600}
    button:hover{background:#6366f1}
    ul{list-style:none;display:grid;gap:1rem}
    li{background:#0e1628;border:1px solid #1e293b;padding:1rem;border-radius:12px}
    .badge{display:inline-block;font-size:.85rem;background:#1e293b;color:#94a3b8;padding:.25rem .5rem;border-radius:.25rem;margin-right:.4rem}
    .alert{background:#7f1d1d;border-color:#991b1b;color:#fca5a5}
    .muted{text-align:center;opacity:.6;font-style:italic}
    a{color:#60a5fa;text-decoration:none}
  </style>
</head>
<body>
  <header>
    <div class="nav"><a href="/">← Accueil</a></div>
    <h1>🔍 Insidr – Instagram Search</h1>
    <div class="search-bar">
      <input id="q" placeholder="Rechercher..." autocomplete="off">
      <button id="go">Rechercher</button>
    </div>
  </header>
  <ul id="results"></ul>
  <script src="/app.js"></script>
</body>
</html>
